- name: "John Clark — CEO, Nicus Software"
  source: linkedin
  profile_url: "https://www.linkedin.com/in/john-clark-nicus/"
  photo: "/images/linkedin/john_clark.jpeg"
  text: |
    Marketing in the ITFM/TBM space is uniquely difficult. Our buyers — CIOs, CFOs, and IT Finance leaders at Fortune 500 companies and major government agencies — are sophisticated and skeptical. They've heard every vendor pitch, can spot generic copy from a mile away, and have no patience for content that doesn't speak intelligently to their problems.

    When we engaged Wil, he had zero background in IT Financial Management. He'd never built a cost model, never run a chargeback program, never sat in on a quarterly IT budget defense. Most writers could never bridge that gap.

    Wil ramped from zero to SME-level in a matter of weeks — producing collateral that read like the work of a 10-year ITFM practitioner, not a copywriter learning the acronyms.

    He tactfully stoked our buyers' complex pain points, in their own language, and consistently drew a sharp line from that pain to our solutions. Our sales team had collateral they actually wanted to share with prospects, and prospects engaged with it.

    If you're in a technical or specialist market and you're worried that no outside writer will ever really 'get it' — Wil is the exception.

- name: "Lou Cozzolino"
  org: "Lone Survivalist"
  org_url: "https://lonesurvivalist.com/"
  photo: "/images/lou_cozzolino.jpg"
  text: |
    "As a guy who built an affiliate company, solely through email, from $0 to $300,000 every month, if I could choose 1 guy to do it again with from scratch. 1 no nonsense writer. 1 entrepreneur to create compelling email, converting sales copy and day 1 profitable product funnels that can scale.

    **I'd choose Wil because he was with me and built it to those staggering numbers along side me.**

    There are just not that many people that have written, tested, and analyzed the amount of copy Wil has.

    There are even fewer who have critiqued thousands of cold traffic emails, and made them work, while leading a team of 8 writers to do the same.

    Frankly, copy is a key component that makes the rain inside any business. Most can't produce it. Less can analyze it. Less can teach it. Less can grow a profit line with it, day in and day out.

    Wil does all of that.

    Period."

- name: "Ryan Healy"
  org: "Upsender"
  org_url: "https://upsender.com/"
  photo: "/images/ryan_healy.jpg"
  text: |
    **"I've outsourced to other writers here and there, but Wil is my go-to guy when I need to outsource copy.**

    He has excellent research skills. He's self-motivated. He hits deadlines. And he writes damn good copy.

    I can toss him an idea and let him run with it without ever worrying if we're on the same page. He knows how to take feedback. He asks the right questions. Overall, he just "gets it."

    His abilities are quickly eclipsing "up-and-comer" status, and I strongly recommend you work with him. (In fact, I often send him referrals.)

    Just please don't send him too much work… I'd like to keep working with Wil for a long time. ;-)"

