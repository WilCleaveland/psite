# Testimonials
# -------------------------------------------------------------------------
# Single source of truth for testimonials displayed on:
#   - the homepage testimonials section          (pages/home.md)
#   - the /upwork/ testimonials section          (pages/upwork.md)
#   - the standalone /testimonials/ page         (pages/testimonials.md)
#
# Order on the page = order in this file. Reorder by moving entries up or
# down. The render include (_includes/theme/testimonials.html) emits the
# right markup for whichever page it's called from.
#
# Two flavors of entry:
#
#   1. CURATED testimonial — full byline (name + org + org_url + local
#      headshot). Body text may use Markdown (e.g. **bold**) and should
#      include literal "" quote marks if you want them rendered.
#
#       - name: "Recommender's full name"
#         org: "Their company or org"            # optional
#         org_url: "https://..."                 # optional
#         photo: "/images/headshot.jpg"          # optional, local path
#         text: |
#           "Multi-paragraph quote text. Blank line for paragraph break."
#
#   2. LINKEDIN-sourced — flagged with `source: linkedin`. Renders with a
#      LinkedIn-blue accent strip + corner badge so visitors can tell it's
#      pulled from a real LinkedIn recommendation. The `name` field can be
#      the LinkedIn-style "Name - Title, Company" combined string.
#
#       - name: "Name - Title, Company"
#         source: linkedin                       # REQUIRED for LinkedIn styling
#         profile_url: "https://www.linkedin.com/in/..."
#         photo: "/images/linkedin/firstname_lastname.jpg"   # optional
#         text: |
#           Recommendation body. No leading "" needed; LinkedIn doesn't
#           render them on the source so we don't either.
#
# Harvesting more LinkedIn entries: see ../linkedin-bookmarklet.md. The
# bookmarklet's YAML output is a starting point — paste it here and add
# `source: linkedin` to each entry before saving.
# -------------------------------------------------------------------------

