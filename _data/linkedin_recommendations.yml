# LinkedIn Recommendations
# -------------------------------------------------------------------------
# This file is the single source of truth for LinkedIn recommendations
# embedded on the site (homepage + /upwork/ testimonials sections).
#
# To refresh:
#   1. Log in to LinkedIn and navigate to:
#      https://www.linkedin.com/in/wilcleaveland/details/recommendations/
#   2. Make sure all recommendations are loaded (scroll to the bottom if
#      LinkedIn lazy-loads them; click "Show more" if it appears).
#   3. Click the "Harvest LinkedIn Recommendations" bookmarklet from your
#      browser bookmarks bar. (See ../linkedin-bookmarklet.md for the
#      one-time setup instructions.)
#   4. The bookmarklet copies a YAML block to your clipboard. Paste it
#      below the schema comment, replacing any prior entries.
#   5. Profile photos: LinkedIn's CDN URLs are session-bound and won't
#      hotlink from your site. If you want photos, right-click the photo
#      on LinkedIn → Save image → save to /images/linkedin/ and reference
#      the local path below. Photos are optional; entries without a
#      `photo` field render with a colored monogram circle instead.
#
# Schema for each entry:
#   - name:         "Full name of the recommender"          (required)
#     headline:     "Their LinkedIn headline / job title"   (optional)
#     relationship: "Context line, e.g. 'Nate was Wil's client'" (optional)
#     date:         "Month Year"                            (optional)
#     text: |                                               (required)
#       "Full recommendation text. YAML | preserves line breaks;
#       use a blank line between paragraphs."
#     profile_url:  "https://www.linkedin.com/in/..."       (optional)
#     photo:        "/images/linkedin/firstname-lastname.jpg" (optional)
# -------------------------------------------------------------------------

# Paste harvested recommendations below. Start the list with a hyphen `-`.
# Leave this file with an empty array (`[]`) when you have no data to embed —
# the include skips rendering anything when the list is empty.

- name: "Colleen Lawler"
