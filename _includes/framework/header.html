<!-- Global site header — renders the same jump-nav pill bar as the homepage
     so every non-home page (work samples, /work/, /testimonials/, /ebook/,
     etc.) shares the same look and funnels visitors back to the relevant
     section of the new homepage. The homepage itself uses _layouts/upwork.html
     which renders its own .upwork-jump-nav inline and skips this partial.
     Pills are driven by _data/menu.yml; an entry with `button: true` renders
     as the filled terracotta CTA. -->
<nav class="site-jump-nav" id="header">
  <div class="container">
    {% for item in site.data.menu.main %}
      {% if item.enabled == false %}{% continue %}{% endif %}
      <a href="{% if item.external %}{{ item.url }}{% else %}{{ item.url | relative_url }}{% endif %}"
         class="site-jump-item{% if item.button %} site-jump-item-cta{% endif %}"
         {% if item.external %}target="_blank" rel="noopener"{% endif %}>
        {{ item.name }}
      </a>
    {% endfor %}
  </div>
</nav>
