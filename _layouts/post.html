---
layout: default
body_classes: page-post
---

<div class="section">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-12 col-lg-8">
        <div class="intro">
          <h1>{{ page.title }}</h1>
          <p class="post-meta" style="color: var(--color-base-text-2); font-style: italic;">
            {{ page.date | date: "%B %-d, %Y" }} &middot; Wil Cleaveland
          </p>
        </div>
        <div class="content">{{ content }}</div>
        <hr style="margin: 48px 0 24px;">
        <p><a href="{{ '/blog/' | relative_url }}">&larr; All posts</a> &middot; <a href="{{ '/ebook/' | relative_url }}">Get the free email copy guide</a></p>
      </div>
    </div>
  </div>
</div>
